# Sample nginx vhost for epoch in front of a TLS-terminating reverse proxy.
#
# Drop into /etc/nginx/sites-available/ and symlink from sites-enabled/.
# Edit per-deploy values:
#   - server_name           — your epoch hostname
#   - ssl_certificate*      — your TLS cert + key paths
#   - proxy_pass upstream   — host:port of the epoch binary
#
# The OCI Distribution settings below are not optional for cocoonstack
# workloads — without them concurrent multi-GiB pushes (cloud-image
# layers, snapshot artifacts) will fail with HTTP/2 PROTOCOL_ERROR or
# disk-full on the nginx temp spool.

server {
    listen 443 ssl http2;
    server_name epoch.example.com;

    ssl_certificate /etc/letsencrypt/live/epoch.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/epoch.example.com/privkey.pem;

    # OCI Distribution: large bodies in both directions, no buffering, no
    # disk spool. Required for streaming push (oras / crane / docker push)
    # of multi-GiB blobs and equally streaming pull of the same.
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_max_temp_file_size 0;

    # HTTP/2 tuning for concurrent large uploads. Default 128 streams ×
    # 64 KiB window is fine for browser traffic but cocoonstack windows
    # build pushes 8 × ~2 GiB layers concurrently — limit concurrency
    # so each in-flight stream gets a sensible share of the connection.
    http2_max_concurrent_streams 32;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suppress Expect: 100-continue translation through the HTTP/2 →
        # HTTP/1.1 boundary; some Go HTTP/2 clients send Expect on every
        # request and nginx + the upstream don't always agree on how to
        # finish the handshake under concurrency.
        proxy_set_header Expect "";

        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }
}
