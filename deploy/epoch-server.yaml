apiVersion: v1
kind: Namespace
metadata:
  name: epoch
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epoch-server
  namespace: epoch
  labels:
    app: epoch-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epoch-server
  template:
    metadata:
      labels:
        app: epoch-server
    spec:
      containers:
        - name: epoch
          image: epoch-server:latest
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --addr=:8080
            - --dsn=epoch:epoch@tcp(mysql.epoch.svc.cluster.local:3306)/epoch?parseTime=true
          env:
            - name: EPOCH_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: epoch-storage
                  key: endpoint
            - name: EPOCH_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: epoch-storage
                  key: accessKey
            - name: EPOCH_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: epoch-storage
                  key: secretKey
            - name: EPOCH_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: epoch-storage
                  key: bucket
            - name: EPOCH_S3_REGION
              valueFrom:
                secretKeyRef:
                  name: epoch-storage
                  key: region
                  optional: true
            - name: EPOCH_S3_SECURE
              valueFrom:
                secretKeyRef:
                  name: epoch-storage
                  key: secure
                  optional: true
            - name: EPOCH_REGISTRY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: epoch-auth
                  key: registryToken
                  optional: true
            - name: SSO_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: epoch-auth
                  key: provider
                  optional: true
            - name: GOOGLE_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: epoch-auth
                  key: googleClientID
                  optional: true
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: epoch-auth
                  key: googleClientSecret
                  optional: true
            - name: GOOGLE_OAUTH_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: epoch-auth
                  key: googleRedirectURI
                  optional: true
            - name: GOOGLE_OAUTH_HOSTED_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: epoch-auth
                  key: googleHostedDomain
                  optional: true
            - name: SSO_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: epoch-auth
                  key: cookieSecret
                  optional: true
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: epoch-server
  namespace: epoch
spec:
  selector:
    app: epoch-server
  ports:
    - port: 8080
      targetPort: http
      name: http
